version: '3'

services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    restart: always

  app2:
    build:
      context: .
      dockerfile: Dockerfile2
    environment:
      - PORT=3000
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
